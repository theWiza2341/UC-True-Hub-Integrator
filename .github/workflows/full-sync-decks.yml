name: Full Sync True Hub Decks

on:
  workflow_dispatch:      # manual run button

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
  
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Discord scraper
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "Starting bot..."
          node bot.js

      - name: Commit updated decks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add decks.json

          git commit -m "Update decks.json [auto]" || echo "No changes to commit"

          git push
